<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flying Air Fryers</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
    canvas { display: block; }
    .controls {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(0,0,0,0.6);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 16px;
      color: #aaa;
      font-family: monospace;
      font-size: 13px;
    }
    input[type=range] { accent-color: #0cf; width: 120px; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div class="controls">
  <label for="speed">Speed: <span id="speedVal">1.0</span>x</label>
  <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1" />
</div>
<script>
class Toaster {
  constructor(w, h) {
    this.screenW = w;
    this.screenH = h;
    this.reset(true);
  }
  reset(initial) {
    this.size = 40 + Math.random() * 45;
    this.speed = 1 + Math.random() * 2.5;
    this.wingPhase = Math.random() * Math.PI * 2;
    this.wingSpeed = 0.07 + Math.random() * 0.04;
    this.displayBlink = Math.random() * Math.PI * 2;
    if (initial) {
      this.x = Math.random() * (this.screenW + 200);
      this.y = Math.random() * this.screenH;
    } else {
      if (Math.random() < 0.5) {
        this.x = this.screenW + this.size;
        this.y = this.screenH * 0.4 + Math.random() * this.screenH * 0.6;
      } else {
        this.x = Math.random() * this.screenW;
        this.y = this.screenH + this.size * 2;
      }
    }
  }
  update(speedMul) {
    const s = this.speed * speedMul;
    this.x -= s * 1.8;
    this.y -= s * 0.9;
    this.wingPhase += this.wingSpeed * Math.max(0.5, speedMul);
    this.displayBlink += 0.03 * speedMul;
    if (this.x < -this.size * 3 || this.y < -this.size * 2) {
      this.reset(false);
    }
  }

  drawWing(ctx, s, flapAngle, mirror) {
    const wingLen = s * 1.2;
    const wingW = s * 0.55;

    ctx.save();
    if (mirror) ctx.scale(-1, 1);
    ctx.rotate(flapAngle);

    const grad = ctx.createLinearGradient(0, 0, -wingLen, -wingW * 0.3);
    grad.addColorStop(0, '#f0ece6');
    grad.addColorStop(0.5, '#ddd8d0');
    grad.addColorStop(1, '#c8c2b8');

    function wingPath() {
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(
        -wingLen * 0.2, -wingW * 0.6,
        -wingLen * 0.5, -wingW * 0.95,
        -wingLen, -wingW * 0.5
      );
      ctx.bezierCurveTo(
        -wingLen * 0.95, -wingW * 0.2,
        -wingLen * 0.85, wingW * 0.0,
        -wingLen * 0.7, wingW * 0.1
      );
      ctx.bezierCurveTo(
        -wingLen * 0.45, wingW * 0.2,
        -wingLen * 0.2, wingW * 0.1,
        0, 0
      );
      ctx.closePath();
    }

    wingPath();
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.strokeStyle = 'rgba(160, 155, 145, 0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.save();
    wingPath();
    ctx.clip();

    ctx.strokeStyle = 'rgba(170, 165, 155, 0.35)';
    ctx.lineWidth = 0.7;
    for (let i = 0; i < 8; i++) {
      const t = (i + 1) / 9;
      const angle = -0.8 - t * 1.1;
      const len = wingLen * (0.5 + t * 0.45);
      ctx.beginPath();
      ctx.moveTo(-s * 0.03 * t, s * 0.02 * t);
      ctx.lineTo(Math.cos(angle) * len, Math.sin(angle) * len);
      ctx.stroke();
    }

    ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
    ctx.lineWidth = s * 0.025;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.01);
    ctx.bezierCurveTo(
      -wingLen * 0.2, -wingW * 0.55,
      -wingLen * 0.5, -wingW * 0.9,
      -wingLen * 0.9, -wingW * 0.5
    );
    ctx.stroke();

    ctx.restore();
    ctx.restore();
  }

  draw(ctx) {
    const s = this.size;
    const flapAngle = Math.sin(this.wingPhase) * 0.4;

    ctx.save();
    ctx.translate(this.x, this.y);

    ctx.save();
    ctx.translate(-s * 0.15, -s * 0.35);
    this.drawWing(ctx, s, -0.15 + flapAngle, false);
    ctx.restore();

    ctx.save();
    ctx.translate(s * 0.15, -s * 0.35);
    this.drawWing(ctx, s, -0.15 + flapAngle, true);
    ctx.restore();

    const bodyW = s * 0.8;
    const bodyH = s * 1.2;
    const seamY = -bodyH / 2 + bodyH * 0.42;

    ctx.beginPath();
    ctx.moveTo(0, -bodyH / 2);
    ctx.bezierCurveTo(
      bodyW * 0.45, -bodyH / 2,
      bodyW * 0.55, -bodyH * 0.15,
      bodyW * 0.5, bodyH * 0.1
    );
    ctx.bezierCurveTo(
      bodyW * 0.48, bodyH * 0.35,
      bodyW * 0.38, bodyH / 2,
      0, bodyH / 2
    );
    ctx.bezierCurveTo(
      -bodyW * 0.38, bodyH / 2,
      -bodyW * 0.48, bodyH * 0.35,
      -bodyW * 0.5, bodyH * 0.1
    );
    ctx.bezierCurveTo(
      -bodyW * 0.55, -bodyH * 0.15,
      -bodyW * 0.45, -bodyH / 2,
      0, -bodyH / 2
    );
    ctx.closePath();

    const bodyGrad = ctx.createLinearGradient(-bodyW * 0.3, -bodyH / 2, bodyW * 0.3, bodyH / 2);
    bodyGrad.addColorStop(0, '#383838');
    bodyGrad.addColorStop(0.3, '#2a2a2a');
    bodyGrad.addColorStop(0.7, '#1e1e1e');
    bodyGrad.addColorStop(1, '#151515');
    ctx.fillStyle = bodyGrad;
    ctx.fill();
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 1.2;
    ctx.stroke();

    ctx.save();
    ctx.clip();
    const hlGrad = ctx.createRadialGradient(
      -bodyW * 0.15, -bodyH * 0.25, 0,
      -bodyW * 0.15, -bodyH * 0.25, bodyW * 0.5
    );
    hlGrad.addColorStop(0, 'rgba(255,255,255,0.1)');
    hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hlGrad;
    ctx.fillRect(-bodyW, -bodyH, bodyW * 2, bodyH * 2);
    ctx.restore();

    ctx.strokeStyle = '#555';
    ctx.lineWidth = 1;
    ctx.beginPath();
    const seamFrac = (seamY + bodyH / 2) / bodyH;
    const seamHalfW = bodyW * (0.42 + seamFrac * 0.12);
    ctx.moveTo(-seamHalfW, seamY);
    ctx.lineTo(seamHalfW, seamY);
    ctx.stroke();

    const handleY = seamY + bodyH * 0.06;
    const handleW = bodyW * 0.5;
    ctx.strokeStyle = '#555';
    ctx.lineWidth = Math.max(2.5, s * 0.04);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-handleW / 2, handleY);
    ctx.quadraticCurveTo(0, handleY + s * 0.08, handleW / 2, handleY);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = Math.max(1, s * 0.02);
    ctx.beginPath();
    ctx.moveTo(-handleW * 0.4, handleY + s * 0.005);
    ctx.quadraticCurveTo(0, handleY + s * 0.065, handleW * 0.4, handleY + s * 0.005);
    ctx.stroke();

    const dispW = bodyW * 0.55;
    const dispH = bodyH * 0.07;
    const dispY = -bodyH * 0.28;
    ctx.fillStyle = '#080808';
    ctx.strokeStyle = '#3a3a3a';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.roundRect(-dispW / 2, dispY, dispW, dispH, 3);
    ctx.fill();
    ctx.stroke();

    const ledAlpha = 0.7 + 0.3 * Math.sin(this.displayBlink * 2);
    ctx.fillStyle = `rgba(0, 200, 255, ${ledAlpha})`;
    ctx.font = `bold ${Math.max(7, s * 0.1)}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0, 200, 255, 0.5)';
    ctx.shadowBlur = 4;
    ctx.fillText('375\u00B0', 0, dispY + dispH / 2);
    ctx.shadowBlur = 0;

    const btnY = dispY + dispH + s * 0.04;
    const btnR = s * 0.03;
    const btnSpacing = bodyW * 0.13;
    ctx.fillStyle = '#333';
    ctx.strokeStyle = '#4a4a4a';
    ctx.lineWidth = 0.5;
    for (let i = -2; i <= 2; i++) {
      ctx.beginPath();
      ctx.arc(i * btnSpacing, btnY, btnR, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
    ctx.fillStyle = `rgba(0, 200, 255, ${0.4 + 0.2 * Math.sin(this.displayBlink * 2)})`;
    ctx.beginPath();
    ctx.arc(0, btnY, btnR * 0.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = '#444';
    ctx.lineWidth = 0.8;
    const ventY = -bodyH / 2 + bodyH * 0.06;
    const ventW = bodyW * 0.25;
    for (let i = 0; i < 4; i++) {
      const vy = ventY + i * s * 0.025;
      ctx.beginPath();
      ctx.moveTo(-ventW / 2, vy);
      ctx.lineTo(ventW / 2, vy);
      ctx.stroke();
    }

    ctx.fillStyle = '#333';
    ctx.beginPath();
    ctx.roundRect(-bodyW * 0.3, bodyH / 2 - 2, bodyW * 0.1, s * 0.04, 1);
    ctx.fill();
    ctx.beginPath();
    ctx.roundRect(bodyW * 0.2, bodyH / 2 - 2, bodyW * 0.1, s * 0.04, 1);
    ctx.fill();

    ctx.restore();
  }
}

class ChickenNugget {
  constructor(w, h) {
    this.screenW = w;
    this.screenH = h;
    this.reset(true);
  }
  reset(initial) {
    this.size = 18 + Math.random() * 22;
    this.speed = 1.2 + Math.random() * 2.8;
    this.spin = Math.random() * Math.PI * 2;
    this.spinSpeed = (0.04 + Math.random() * 0.05) * (Math.random() < 0.5 ? 1 : -1);
    if (initial) {
      this.x = Math.random() * (this.screenW + 200);
      this.y = Math.random() * this.screenH;
    } else {
      if (Math.random() < 0.5) {
        this.x = this.screenW + this.size;
        this.y = this.screenH * 0.4 + Math.random() * this.screenH * 0.6;
      } else {
        this.x = Math.random() * this.screenW;
        this.y = this.screenH + this.size * 2;
      }
    }
  }
  update(speedMul) {
    const s = this.speed * speedMul;
    this.x -= s * 1.8;
    this.y -= s * 0.9;
    this.spin += this.spinSpeed * speedMul;
    if (this.x < -this.size * 3 || this.y < -this.size * 2) {
      this.reset(false);
    }
  }
  draw(ctx) {
    const s = this.size;
    const tumbleScaleY = 0.68 + 0.32 * Math.abs(Math.cos(this.spin));
    const tumbleRot = this.spin * 0.4;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(tumbleRot);
    ctx.scale(1, tumbleScaleY);

    const drawBlob = () => {
      ctx.beginPath();
      ctx.moveTo(s * 0.55, 0);
      ctx.bezierCurveTo(s * 0.6, -s * 0.3, s * 0.35, -s * 0.6, 0, -s * 0.55);
      ctx.bezierCurveTo(-s * 0.3, -s * 0.6, -s * 0.65, -s * 0.35, -s * 0.6, 0);
      ctx.bezierCurveTo(-s * 0.65, s * 0.35, -s * 0.3, s * 0.6, s * 0.1, s * 0.55);
      ctx.bezierCurveTo(s * 0.4, s * 0.6, s * 0.65, s * 0.3, s * 0.55, 0);
      ctx.closePath();
    };

    drawBlob();
    const blobGrad = ctx.createRadialGradient(-s * 0.15, -s * 0.15, s * 0.05, 0, 0, s * 0.9);
    blobGrad.addColorStop(0, '#d4952a');
    blobGrad.addColorStop(0.35, '#b87818');
    blobGrad.addColorStop(0.7, '#8a5208');
    blobGrad.addColorStop(1, '#5e3405');
    ctx.fillStyle = blobGrad;
    ctx.fill();

    // Breading texture — clipped crosshatch
    drawBlob();
    ctx.save();
    ctx.clip();
    ctx.strokeStyle = 'rgba(140, 80, 15, 0.18)';
    ctx.lineWidth = 0.8;
    const step = s * 0.18;
    for (let i = -s * 2; i < s * 2; i += step) {
      ctx.beginPath(); ctx.moveTo(i, -s); ctx.lineTo(i + s, s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(i, s); ctx.lineTo(i + s, -s); ctx.stroke();
    }
    ctx.restore();

    const sheen = ctx.createRadialGradient(-s * 0.2, -s * 0.2, 0, -s * 0.2, -s * 0.2, s * 0.5);
    sheen.addColorStop(0, 'rgba(255,240,180,0.25)');
    sheen.addColorStop(1, 'rgba(255,240,180,0)');
    drawBlob();
    ctx.fillStyle = sheen;
    ctx.fill();

    ctx.restore();
  }
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let toasters = [];
let nuggets = [];
let speedMul = 1;

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  toasters = Array.from({ length: 12 }, () => new Toaster(canvas.width, canvas.height));
  nuggets = Array.from({ length: 14 }, () => new ChickenNugget(canvas.width, canvas.height));
}

window.addEventListener('resize', resize);
resize();

const speedInput = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
speedInput.addEventListener('input', () => {
  speedMul = parseFloat(speedInput.value);
  speedVal.textContent = speedMul.toFixed(1);
});

function animate() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  nuggets.forEach(n => { n.update(speedMul); n.draw(ctx); });
  toasters.forEach(t => { t.update(speedMul); t.draw(ctx); });
  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
